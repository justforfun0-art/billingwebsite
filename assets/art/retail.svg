<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" role="img" aria-label="A barcode being scanned into a point-of-sale screen, with shelved stock and a thermal receipt.">
  <defs>
    <linearGradient id="r-pap" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fffdf8"/><stop offset="1" stop-color="#f4ecdc"/></linearGradient>
    <linearGradient id="r-saff" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e8853f"/><stop offset="1" stop-color="#bf5e1f"/></linearGradient>
    <filter id="r-sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#1d2520" flood-opacity="0.16"/></filter>
  </defs>
  <circle cx="320" cy="80" r="100" fill="#d9712b" opacity="0.07"/>
  <!-- shelves with stock -->
  <g transform="translate(40 60)">
    <rect x="0" y="0" width="120" height="200" rx="8" fill="#efe7d6"/>
    <line x1="0" y1="66" x2="120" y2="66" stroke="#d3c4a6" stroke-width="3"/>
    <line x1="0" y1="134" x2="120" y2="134" stroke="#d3c4a6" stroke-width="3"/>
    <g fill="#0f5e57"><rect x="12" y="26" width="22" height="36" rx="3"/><rect x="44" y="20" width="22" height="42" rx="3" fill="#bf5e1f"/><rect x="76" y="30" width="22" height="32" rx="3"/></g>
    <g fill="#bf5e1f"><rect x="12" y="96" width="22" height="34" rx="3"/><rect x="44" y="90" width="22" height="40" rx="3" fill="#0f5e57"/><rect x="80" y="98" width="22" height="32" rx="3"/></g>
    <g fill="#0a4843"><rect x="16" y="160" width="26" height="34" rx="3"/><rect x="56" y="156" width="26" height="38" rx="3" fill="#d9712b"/></g>
  </g>
  <!-- POS screen with barcode -->
  <g filter="url(#r-sh)" transform="translate(200 90)">
    <rect width="170" height="120" rx="12" fill="#1d2520"/>
    <rect x="10" y="10" width="150" height="100" rx="6" fill="url(#r-pap)"/>
    <!-- barcode -->
    <g transform="translate(24 28)" fill="#1d2520">
      <rect x="0" width="3" height="40"/><rect x="6" width="2" height="40"/><rect x="11" width="4" height="40"/><rect x="18" width="2" height="40"/><rect x="23" width="3" height="40"/><rect x="29" width="5" height="40"/><rect x="37" width="2" height="40"/><rect x="42" width="3" height="40"/><rect x="48" width="2" height="40"/><rect x="53" width="4" height="40"/><rect x="60" width="2" height="40"/><rect x="65" width="3" height="40"/><rect x="71" width="5" height="40"/><rect x="79" width="2" height="40"/><rect x="84" width="3" height="40"/>
    </g>
    <!-- scan beam -->
    <rect x="20" y="46" width="98" height="3" fill="#d9712b" opacity="0.9"/>
    <text x="85" y="86" text-anchor="middle" font-family="monospace" font-size="9" fill="#0a4843" font-weight="bold">8901234 567890</text>
    <text x="85" y="100" text-anchor="middle" font-family="monospace" font-size="8" fill="#8a8f84">added to cart ✓</text>
  </g>
  <!-- mini receipt -->
  <g filter="url(#r-sh)" transform="translate(248 226)">
    <rect width="74" height="86" rx="6" fill="#fffdf8" stroke="#e2d8c4"/>
    <g font-family="monospace" font-size="7" fill="#9aa091">
      <text x="37" y="16" text-anchor="middle" fill="#1d2520" font-size="8" font-weight="bold">RECEIPT</text>
      <text x="10" y="32">Soap</text><text x="64" y="32" text-anchor="end">45</text>
      <text x="10" y="44">Rice 5kg</text><text x="64" y="44" text-anchor="end">320</text>
      <line x1="10" y1="50" x2="64" y2="50" stroke="#e2d8c4" stroke-dasharray="2 2"/>
      <text x="10" y="64" fill="#1d2520" font-weight="bold">TOTAL</text><text x="64" y="64" text-anchor="end" fill="#bf5e1f" font-weight="bold">365</text>
    </g>
  </g>
</svg>
