<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" role="img" aria-label="A repair job moving through received, in-progress and ready stages, with a customer notification on a phone.">
  <defs>
    <linearGradient id="s-pap" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fffdf8"/><stop offset="1" stop-color="#f4ecdc"/></linearGradient>
    <linearGradient id="s-tl" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#13716a"/><stop offset="1" stop-color="#0a4843"/></linearGradient>
    <filter id="s-sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#1d2520" flood-opacity="0.16"/></filter>
  </defs>
  <circle cx="90" cy="80" r="100" fill="#0f5e57" opacity="0.06"/>
  <circle cx="330" cy="280" r="90" fill="#d9712b" opacity="0.07"/>
  <!-- status pipeline -->
  <g transform="translate(40 70)">
    <line x1="30" y1="20" x2="220" y2="20" stroke="#d3c4a6" stroke-width="3"/>
    <!-- received -->
    <circle cx="30" cy="20" r="16" fill="url(#s-tl)"/><path d="M23 20 l5 5 9 -10" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="30" y="56" text-anchor="middle" font-family="monospace" font-size="8" fill="#3c463f">Received</text>
    <!-- in progress -->
    <circle cx="125" cy="20" r="16" fill="url(#s-tl)"/><path d="M118 20 l5 5 9 -10" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="125" y="56" text-anchor="middle" font-family="monospace" font-size="8" fill="#3c463f">In progress</text>
    <!-- ready -->
    <circle cx="220" cy="20" r="16" fill="#e8853f"/><circle cx="220" cy="20" r="6" fill="#fff"/>
    <text x="220" y="56" text-anchor="middle" font-family="monospace" font-size="8" fill="#bf5e1f" font-weight="bold">Ready</text>
  </g>
  <!-- job card -->
  <g filter="url(#s-sh)" transform="translate(48 150)">
    <rect width="160" height="140" rx="12" fill="url(#s-pap)" stroke="#e2d8c4"/>
    <rect width="160" height="32" rx="12" fill="#1d2520"/><rect y="20" width="160" height="12" fill="#1d2520"/>
    <text x="16" y="21" font-family="'Schibsted Grotesk',sans-serif" font-size="11" fill="#f7f2e9" font-weight="bold">Repair · #4821</text>
    <g font-family="monospace" font-size="9" fill="#6b7269">
      <text x="16" y="58">Item: mixer</text>
      <text x="16" y="78">Parts</text><text x="144" y="78" text-anchor="end" fill="#3c463f">₹280</text>
      <text x="16" y="96">Labour</text><text x="144" y="96" text-anchor="end" fill="#3c463f">₹200</text>
      <line x1="16" y1="106" x2="144" y2="106" stroke="#1d2520" stroke-width="1.5"/>
    </g>
    <text x="16" y="126" font-family="'Schibsted Grotesk',sans-serif" font-size="11" font-weight="bold" fill="#1d2520">Total</text>
    <text x="144" y="126" text-anchor="end" font-family="monospace" font-size="13" font-weight="bold" fill="#bf5e1f">₹480</text>
  </g>
  <!-- phone notification -->
  <g filter="url(#s-sh)" transform="rotate(5 290 210)">
    <rect x="244" y="140" width="104" height="150" rx="18" fill="#1d2520"/>
    <rect x="252" y="150" width="88" height="130" rx="10" fill="#fffdf8"/>
    <rect x="262" y="166" width="68" height="44" rx="8" fill="#dcebe8"/>
    <circle cx="276" cy="182" r="7" fill="url(#s-tl)"/>
    <text x="288" y="180" font-family="monospace" font-size="7" fill="#0a4843" font-weight="bold">Gear Hub</text>
    <text x="288" y="192" font-family="monospace" font-size="6" fill="#3c463f">Your repair is</text>
    <text x="288" y="201" font-family="monospace" font-size="6" fill="#3c463f">ready for pickup!</text>
    <rect x="262" y="222" width="68" height="20" rx="6" fill="#e8853f"/>
    <text x="296" y="235" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff" font-weight="bold">Track status</text>
    <rect x="284" y="268" width="24" height="3" rx="1.5" fill="#1d2520"/>
  </g>
</svg>
