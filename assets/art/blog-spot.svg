<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-label="An open guidebook with a pencil and a lightbulb, representing practical shop guides.">
  <defs>
    <linearGradient id="b-pap" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fffdf8"/><stop offset="1" stop-color="#f4ecdc"/></linearGradient>
    <linearGradient id="b-saff" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e8853f"/><stop offset="1" stop-color="#bf5e1f"/></linearGradient>
    <filter id="b-sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#1d2520" flood-opacity="0.14"/></filter>
  </defs>
  <rect width="400" height="200" fill="#efe7d6"/>
  <circle cx="330" cy="50" r="80" fill="#d9712b" opacity="0.10"/>
  <circle cx="70" cy="170" r="70" fill="#0f5e57" opacity="0.08"/>
  <!-- open book -->
  <g filter="url(#b-sh)" transform="translate(110 60)">
    <path d="M90 14 C60 0 24 4 0 16 V96 C24 84 60 80 90 94 Z" fill="url(#b-pap)" stroke="#e2d8c4"/>
    <path d="M90 14 C120 0 156 4 180 16 V96 C156 84 120 80 90 94 Z" fill="url(#b-pap)" stroke="#e2d8c4"/>
    <line x1="90" y1="14" x2="90" y2="94" stroke="#d3c4a6"/>
    <g stroke="#cdbf9f" stroke-width="2.4" stroke-linecap="round">
      <line x1="16" y1="34" x2="74" y2="30"/><line x1="16" y1="48" x2="74" y2="44"/><line x1="16" y1="62" x2="64" y2="59"/>
      <line x1="106" y1="30" x2="164" y2="34"/><line x1="106" y1="44" x2="164" y2="48"/><line x1="106" y1="59" x2="150" y2="62"/>
    </g>
  </g>
  <!-- lightbulb idea -->
  <g filter="url(#b-sh)" transform="translate(300 96)">
    <circle r="26" fill="url(#b-saff)"/>
    <path d="M0 -12 a12 12 0 0 1 7 21 v5 h-14 v-5 a12 12 0 0 1 7 -21 Z" fill="#fffdf8"/>
    <rect x="-5" y="13" width="10" height="5" rx="2" fill="#1d2520"/>
    <g stroke="#fffdf8" stroke-width="2" stroke-linecap="round" opacity="0.9"><line x1="-30" y1="0" x2="-38" y2="0"/><line x1="30" y1="0" x2="38" y2="0"/><line x1="0" y1="-30" x2="0" y2="-38"/></g>
  </g>
  <!-- pencil -->
  <g transform="rotate(40 90 150)">
    <rect x="60" y="142" width="70" height="12" rx="2" fill="#0f5e57"/>
    <path d="M130 142 l14 6 l-14 6 z" fill="#e8c79a"/><path d="M138 145 l6 3 l-6 3 z" fill="#1d2520"/>
    <rect x="56" y="142" width="6" height="12" rx="2" fill="#bf5e1f"/>
  </g>
</svg>
