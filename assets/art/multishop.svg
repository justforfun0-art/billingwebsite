<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" role="img" aria-label="Two shop storefronts connected to one owner dashboard, with stock transferring between branches.">
  <defs>
    <linearGradient id="m-pap" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fffdf8"/><stop offset="1" stop-color="#f4ecdc"/></linearGradient>
    <linearGradient id="m-saff" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e8853f"/><stop offset="1" stop-color="#bf5e1f"/></linearGradient>
    <filter id="m-sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#1d2520" flood-opacity="0.16"/></filter>
  </defs>
  <circle cx="200" cy="60" r="90" fill="#d9712b" opacity="0.07"/>
  <!-- connecting lines from owner node to shops -->
  <path d="M200 120 V160 M200 160 H90 V210 M200 160 H310 V210" fill="none" stroke="#d3c4a6" stroke-width="2" stroke-dasharray="5 5"/>
  <!-- owner node -->
  <g filter="url(#m-sh)" transform="translate(200 90)">
    <rect x="-58" y="-26" width="116" height="52" rx="12" fill="#1d2520"/>
    <text y="-4" text-anchor="middle" font-family="'Schibsted Grotesk',sans-serif" font-size="12" fill="#f7f2e9" font-weight="bold">Owner view</text>
    <text y="14" text-anchor="middle" font-family="monospace" font-size="9" fill="#9aa091">all outlets · live</text>
  </g>
  <!-- shop 1 -->
  <g filter="url(#m-sh)" transform="translate(40 210)">
    <rect width="100" height="100" rx="12" fill="url(#m-pap)" stroke="#e2d8c4"/>
    <path d="M0 26 L50 2 L100 26 Z" fill="url(#m-saff)"/>
    <rect x="0" y="26" width="100" height="10" fill="#bf5e1f" opacity="0.5"/>
    <rect x="20" y="50" width="60" height="40" rx="4" fill="#efe7d6"/>
    <text x="50" y="74" text-anchor="middle" font-family="monospace" font-size="11" fill="#1d2520" font-weight="bold">S1</text>
    <text x="50" y="86" text-anchor="middle" font-family="monospace" font-size="7" fill="#8a8f84">Main</text>
  </g>
  <!-- shop 2 -->
  <g filter="url(#m-sh)" transform="translate(260 210)">
    <rect width="100" height="100" rx="12" fill="url(#m-pap)" stroke="#e2d8c4"/>
    <path d="M0 26 L50 2 L100 26 Z" fill="#0f5e57"/>
    <rect x="0" y="26" width="100" height="10" fill="#0a4843" opacity="0.5"/>
    <rect x="20" y="50" width="60" height="40" rx="4" fill="#efe7d6"/>
    <text x="50" y="74" text-anchor="middle" font-family="monospace" font-size="11" fill="#1d2520" font-weight="bold">S2</text>
    <text x="50" y="86" text-anchor="middle" font-family="monospace" font-size="7" fill="#8a8f84">Annex</text>
  </g>
  <!-- transfer arrow between shops -->
  <g transform="translate(155 260)">
    <path d="M0 0 H80" stroke="#bf5e1f" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M80 0 l-9 -6 v12 z" fill="#bf5e1f"/>
    <rect x="22" y="-22" width="46" height="16" rx="8" fill="#f6e3d0"/>
    <text x="45" y="-10" text-anchor="middle" font-family="monospace" font-size="8" fill="#bf5e1f">stock</text>
  </g>
</svg>
