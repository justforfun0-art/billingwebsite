<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" role="img" aria-label="A GST invoice with HSN codes and a CGST, SGST and IGST tax breakdown, beside a verified e-invoice IRN badge.">
  <defs>
    <linearGradient id="g-pap" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fffdf8"/><stop offset="1" stop-color="#f4ecdc"/></linearGradient>
    <linearGradient id="g-tl" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#13716a"/><stop offset="1" stop-color="#0a4843"/></linearGradient>
    <filter id="g-sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1d2520" flood-opacity="0.16"/></filter>
  </defs>
  <circle cx="330" cy="70" r="100" fill="#d9712b" opacity="0.07"/>
  <circle cx="70" cy="290" r="90" fill="#0f5e57" opacity="0.06"/>
  <g filter="url(#g-sh)">
    <rect x="60" y="40" width="220" height="260" rx="16" fill="url(#g-pap)" stroke="#e2d8c4"/>
    <rect x="60" y="40" width="220" height="44" rx="16" fill="#1d2520"/><rect x="60" y="70" width="220" height="14" fill="#1d2520"/>
    <text x="80" y="68" font-family="Georgia,serif" font-size="15" fill="#f7f2e9" font-weight="bold">GST Invoice</text>
    <g font-family="monospace" font-size="10">
      <text x="80" y="112" fill="#8a8f84">HSN 8712</text><text x="260" y="112" text-anchor="end" fill="#3c463f">₹12,000</text>
      <text x="80" y="146" fill="#0a4843">CGST 9%</text><text x="260" y="146" text-anchor="end" fill="#3c463f">₹1,080</text>
      <text x="80" y="170" fill="#0a4843">SGST 9%</text><text x="260" y="170" text-anchor="end" fill="#3c463f">₹1,080</text>
      <line x1="80" y1="186" x2="260" y2="186" stroke="#1d2520" stroke-width="1.5"/>
    </g>
    <text x="80" y="210" font-family="'Schibsted Grotesk',sans-serif" font-size="13" font-weight="bold" fill="#1d2520">Total</text>
    <text x="260" y="210" text-anchor="end" font-family="monospace" font-size="14" font-weight="bold" fill="#bf5e1f">₹14,160</text>
    <!-- mini QR -->
    <g transform="translate(80 232)" fill="#1d2520">
      <rect width="46" height="46" fill="none" stroke="#1d2520"/>
      <rect x="4" y="4" width="12" height="12"/><rect x="30" y="4" width="12" height="12"/><rect x="4" y="30" width="12" height="12"/>
      <rect x="22" y="22" width="6" height="6"/><rect x="32" y="32" width="6" height="6"/><rect x="22" y="34" width="5" height="5"/>
    </g>
    <text x="138" y="252" font-family="monospace" font-size="8" fill="#8a8f84">e-Invoice</text>
    <text x="138" y="266" font-family="monospace" font-size="8" fill="#8a8f84">IRN signed</text>
  </g>
  <!-- IRN verified badge -->
  <g filter="url(#g-sh)" transform="translate(250 200)">
    <circle r="44" fill="url(#g-tl)"/>
    <path d="M-18 0 l12 13 24 -28" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text y="30" text-anchor="middle" font-family="monospace" font-size="9" fill="#cdeae6">IRN ✓</text>
  </g>
</svg>
